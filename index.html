<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瓦利耶娃的冰上电台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .subtitle {
            color: #8b949e;
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 30px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 16px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .video-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .video-card:hover {
            border-color: #58a6ff;
        }
        .video-card video {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            background: #000;
            display: block;
        }
        .video-info {
            padding: 12px 16px 14px;
        }
        .video-info .title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-info .meta {
            font-size: 13px;
            color: #8b949e;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }
        .error {
            text-align: center;
            padding: 60px 20px;
            color: #f85149;
        }
        .stats {
            font-size: 14px;
            color: #8b949e;
            margin-left: 12px;
        }
        @media (max-width: 600px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 22px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <h1>
	🎬 冰上电台
        <span class="stats" id="videoCount"></span>
    </h1>
    <div class="subtitle">当瓦利耶娃的花滑遇上风格迥异的音乐 · 点击播放即可观看</div>

    <div id="app">
        <div class="loading">⏳ 正在加载视频列表...</div>
    </div>

    <script>
        // 这里就是你上传到 R2 的 videos.json 的地址
        // 注意：videos.json 必须和 index.html 放在同一个 GitHub 仓库根目录
        const JSON_URL = './videos.json';

        async function loadVideos() {
            const app = document.getElementById('app');

            try {
                const response = await fetch(JSON_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const videos = await response.json();

                if (!videos || videos.length === 0) {
                    app.innerHTML = '<div class="error">😅 暂无视频数据</div>';
                    return;
                }

                // 更新统计
                document.getElementById('videoCount').textContent = `（共 ${videos.length} 期）`;

                // 渲染视频卡片
                const grid = document.createElement('div');
                grid.className = 'video-grid';

                videos.forEach(v => {
                    const card = document.createElement('div');
                    card.className = 'video-card';

                    // 视频播放器
                    const video = document.createElement('video');
                    video.controls = true;
                    video.preload = 'metadata';
                    video.playsInline = true; // 移动端友好
                    // 设置视频源
                    const source = document.createElement('source');
                    source.src = v.video_url;
                    source.type = 'video/mp4';
                    video.appendChild(source);
                    // 如果视频无法播放，显示提示
                    video.innerHTML += '您的浏览器不支持视频播放。';

                    // 信息区
                    const info = document.createElement('div');
                    info.className = 'video-info';

                    const titleEl = document.createElement('div');
                    titleEl.className = 'title';
                    titleEl.textContent = v.title || v.id || '未命名视频';

                    const metaEl = document.createElement('div');
                    metaEl.className = 'meta';
                    metaEl.textContent = v.date || '';

                    info.appendChild(titleEl);
                    info.appendChild(metaEl);
                    card.appendChild(video);
                    card.appendChild(info);
                    grid.appendChild(card);
                });

                app.innerHTML = '';
                app.appendChild(grid);

            } catch (err) {
                console.error(err);
                app.innerHTML = `
                    <div class="error">
                        ❌ 加载视频列表失败：${err.message}<br>
                        <small style="color:#8b949e;font-size:13px;">请确认 videos.json 文件存在且格式正确。</small>
                    </div>
                `;
            }
        }

        loadVideos();
    </script>
</body>
</html>
